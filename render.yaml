services:
  - type: web
    name: tradingview-dhan-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: WEBHOOK_TOKEN
        generateValue: true
      - key: ALERT_DB_PATH
        value: /opt/render/project/src/alerts.db
